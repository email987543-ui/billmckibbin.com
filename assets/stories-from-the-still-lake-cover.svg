<svg width="660" height="1056" viewBox="0 0 660 1056" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Novella cover for Stories From The Still Lake: a symmetric night scene with a large veiled moon over a still lake, its reflection path broken by a single ripple; reed silhouettes frame both shores; deep pewter and teal palette, serif type.">
<title>Stories From The Still Lake: a Chronicles of the Still Lake novella</title>
<desc>Mirror-symmetric night scene: a veiled moon low over the horizon; its moonglade descends the water and is broken by one clean concentric ripple; below the ripple the water is perfectly still. Reeds frame the foreground banks.</desc>
<defs>
<linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#040710"/><stop offset="0.4535" stop-color="#0d1622"/><stop offset="0.745" stop-color="#22323f"/><stop offset="0.9476" stop-color="#5d7079"/><stop offset="0.9993" stop-color="#8fa3a6"/>
</linearGradient>
<linearGradient id="water2" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#42545c"/><stop offset="0.12" stop-color="#233240"/><stop offset="0.55" stop-color="#101b26"/><stop offset="1" stop-color="#070d15"/>
</linearGradient>
<radialGradient id="moonglow2" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#f6f4ec" stop-opacity="0.85"/><stop offset="0.22" stop-color="#e8e9e2" stop-opacity="0.32"/><stop offset="0.55" stop-color="#d8dcd8" stop-opacity="0.10"/><stop offset="1" stop-color="#d8dcd8" stop-opacity="0"/>
</radialGradient>
<radialGradient id="moonface2" cx="0.42" cy="0.4" r="0.75">
<stop offset="0" stop-color="#fbfaf3"/><stop offset="0.75" stop-color="#e9e9df"/><stop offset="1" stop-color="#d5d8cf"/>
</radialGradient>
<radialGradient id="ripglow2" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#8fc4bc" stop-opacity="0.32"/><stop offset="0.5" stop-color="#6ba9a2" stop-opacity="0.07"/><stop offset="1" stop-color="#6ba9a2" stop-opacity="0"/>
</radialGradient>
<radialGradient id="vig2" cx="0.5" cy="0.46" r="0.85">
<stop offset="0.55" stop-color="#000000" stop-opacity="0"/><stop offset="1" stop-color="#01040a" stop-opacity="0.78"/>
</radialGradient>
<filter id="grain2" x="0" y="0" width="100%" height="100%">
<feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" result="n"/><feColorMatrix in="n" type="saturate" values="0"/>
</filter>
<filter id="soft2" x="-15%" y="-250%" width="130%" height="600%"><feGaussianBlur stdDeviation="4"/></filter>
</defs>

<!-- sky -->
<rect width="660" height="652" fill="url(#sky2)"/>

<!-- stars: sparse, symmetric-balanced, clear of the moon -->
<g fill="#dfe7ea">
<circle cx="76" cy="446" r="1.1" opacity="0.34"/><circle cx="584" cy="446" r="1.1" opacity="0.34"/>
<circle cx="132" cy="490" r="0.9" opacity="0.26"/><circle cx="528" cy="490" r="0.9" opacity="0.26"/>
<circle cx="52" cy="530" r="0.8" opacity="0.20"/><circle cx="608" cy="530" r="0.8" opacity="0.20"/>
<circle cx="182" cy="430" r="0.8" opacity="0.22"/><circle cx="478" cy="430" r="0.8" opacity="0.22"/>
<circle cx="106" cy="44" r="1.0" opacity="0.28"/><circle cx="554" cy="44" r="1.0" opacity="0.28"/>
<circle cx="48" cy="150" r="0.9" opacity="0.22"/><circle cx="612" cy="150" r="0.9" opacity="0.22"/>
<circle cx="238" cy="466" r="0.7" opacity="0.18"/><circle cx="422" cy="466" r="0.7" opacity="0.18"/>
</g>

<!-- the veiled moon -->
<circle cx="330" cy="520" r="180" fill="url(#moonglow2)"/>
<circle cx="330" cy="520" r="46" fill="url(#moonface2)"/>
<!-- the veil: slim cloud wisps crossing the disc, symmetric -->
<g fill="#16222e">
<ellipse cx="330" cy="508" rx="118" ry="6.5" opacity="0.42" filter="url(#soft2)"/>
<ellipse cx="330" cy="530" rx="150" ry="8" opacity="0.55" filter="url(#soft2)"/>
<ellipse cx="330" cy="551" rx="96" ry="5" opacity="0.38" filter="url(#soft2)"/>
</g>

<!-- far shore: low treeline, symmetric, parted at the moonglade -->
<path d="M0 652 L0 640 L46 636 L92 641 L138 635 L186 640 L232 634 L272 640 L306 643 L330 644 L354 643 L388 640 L428 634 L474 640 L522 635 L568 641 L614 636 L660 640 L660 652 Z" fill="#0a1219"/>

<!-- water -->
<rect y="652" width="660" height="404" fill="url(#water2)"/>
<!-- horizon light, feathered -->
<ellipse cx="330" cy="653" rx="380" ry="7" fill="#c9d4d4" opacity="0.20" filter="url(#soft2)"/>
<ellipse cx="330" cy="660" rx="300" ry="5" fill="#c9d4d4" opacity="0.12" filter="url(#soft2)"/>

<!-- the moonglade: a tapering shimmer that the ripple will break -->
<g fill="#e9efe9">
<ellipse cx="330" cy="672" rx="66" ry="2.6" opacity="0.30"/>
<ellipse cx="330" cy="684" rx="58" ry="2.4" opacity="0.26"/>
<ellipse cx="330" cy="697" rx="52" ry="2.3" opacity="0.23"/>
<ellipse cx="330" cy="711" rx="46" ry="2.2" opacity="0.20"/>
<ellipse cx="330" cy="726" rx="40" ry="2.0" opacity="0.17"/>
<ellipse cx="330" cy="742" rx="34" ry="1.9" opacity="0.14"/>
<ellipse cx="330" cy="759" rx="29" ry="1.8" opacity="0.12"/>
<ellipse cx="330" cy="777" rx="24" ry="1.7" opacity="0.10"/>
</g>

<!-- THE RIPPLE: a single ring-set catching the moonlight; below it, stillness -->
<ellipse cx="330" cy="828" rx="250" ry="62" fill="url(#ripglow2)"/>
<g fill="none">
<ellipse cx="330" cy="828" rx="26" ry="6" stroke="#f4f0e2" stroke-width="3.0" opacity="0.85"/>
<ellipse cx="330" cy="828" rx="58" ry="13.5" stroke="#e3e8e0" stroke-width="2.4" opacity="0.55"/>
<ellipse cx="330" cy="828" rx="98" ry="23" stroke="#c9d8d5" stroke-width="1.5" opacity="0.28"/>
<ellipse cx="330" cy="828" rx="146" ry="34" stroke="#b7cac8" stroke-width="1.4" opacity="0.18"/>
<ellipse cx="330" cy="828" rx="200" ry="47" stroke="#a8bdbc" stroke-width="1.3" opacity="0.11"/>
<ellipse cx="330" cy="828" rx="252" ry="60" stroke="#9cb2b2" stroke-width="1.2" opacity="0.06"/>
</g>

<!-- foreground banks -->
<path d="M0 1056 L0 1006 Q 110 992 210 1010 Q 300 1026 330 1027 Q 360 1026 450 1010 Q 550 992 660 1006 L660 1056 Z" fill="#04080e"/>

<!-- reeds: mirrored clusters, cattail heads, silhouette only -->
<g stroke="#04070c" fill="none" stroke-linecap="round">
<path d="M44 1010 Q 52 900 57 838" stroke-width="3"/>
<path d="M70 1014 Q 74 926 80 868" stroke-width="2.6"/>
<path d="M96 1018 Q 106 934 116 884" stroke-width="2.6"/>
<path d="M124 1022 Q 128 956 133 912" stroke-width="2.2"/>
<path d="M150 1026 Q 160 968 168 930" stroke-width="2"/>
<path d="M30 1008 Q 22 950 12 916" stroke-width="2"/>
<path d="M616 1010 Q 608 900 603 838" stroke-width="3"/>
<path d="M590 1014 Q 586 926 580 868" stroke-width="2.6"/>
<path d="M564 1018 Q 554 934 544 884" stroke-width="2.6"/>
<path d="M536 1022 Q 532 956 527 912" stroke-width="2.2"/>
<path d="M510 1026 Q 500 968 492 930" stroke-width="2"/>
<path d="M630 1008 Q 638 950 648 916" stroke-width="2"/>
</g>
<g fill="#04070c">
<ellipse cx="57" cy="833" rx="4.6" ry="17"/><ellipse cx="80" cy="864" rx="4" ry="14.5"/><ellipse cx="116" cy="880" rx="3.6" ry="13"/>
<ellipse cx="603" cy="833" rx="4.6" ry="17"/><ellipse cx="580" cy="864" rx="4" ry="14.5"/><ellipse cx="544" cy="880" rx="3.6" ry="13"/>
</g>

<!-- vignette + grain UNDER the type -->
<rect width="660" height="1056" fill="url(#vig2)"/>
<rect width="660" height="1056" filter="url(#grain2)" opacity="0.05"/>

<!-- ===== TYPE ===== -->
<text x="330" y="80" text-anchor="middle" font-family="'Hoefler Text', Georgia, serif" font-size="16" letter-spacing="3.4" fill="#c6d0d3" opacity="0.92">A CHRONICLES OF THE STILL LAKE NOVELL<tspan letter-spacing="0">A</tspan></text>
<line x1="196" y1="104" x2="296" y2="104" stroke="#b6c1c4" stroke-width="0.8" opacity="0.5"/>
<line x1="364" y1="104" x2="464" y2="104" stroke="#b6c1c4" stroke-width="0.8" opacity="0.5"/>
<circle cx="330" cy="104" r="1.8" fill="#b6c1c4" opacity="0.6"/>

<text x="330" y="198" text-anchor="middle" font-family="'Hoefler Text', Georgia, serif" font-size="54" font-style="italic" fill="#eef4f3">Stories From</text>
<text x="330" y="298" text-anchor="middle" font-family="'Hoefler Text', Georgia, serif" font-size="94" fill="#9fc4bd" opacity="0.35" filter="url(#soft2)">The Still Lake</text>
<text x="330" y="298" text-anchor="middle" font-family="'Hoefler Text', Georgia, serif" font-size="94" fill="#f4f8f7">The Still Lake</text>

<line x1="240" y1="338" x2="420" y2="338" stroke="#c1cacf" stroke-width="1.1" opacity="0.6"/>
<text x="330" y="374" text-anchor="middle" font-family="'Hoefler Text', Georgia, serif" font-size="19" font-style="italic" fill="#cdd7d9" opacity="1">Three legends the Lake remembers</text>

<text x="330" y="982" text-anchor="middle" font-family="'Hoefler Text', Georgia, serif" font-size="36" letter-spacing="3.8" fill="#f4f8f7">BILL McKIBBI<tspan letter-spacing="0">N</tspan></text>
</svg>
