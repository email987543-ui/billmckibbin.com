<svg viewBox="0 0 660 1056" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Novella cover for Stories From The Still Lake: a symmetrical composition — an empty still lake at night, a veiled moon centered on the vertical axis, a single clean concentric ripple directly beneath it, reeds framing both shores equally, deep pewter palette, serif title.">
<title>Stories From The Still Lake — novella cover (symmetric, empty lake)</title>
<desc>Mirror-symmetric: centered veiled moon over a centered uncaused ripple on an empty, unbroken lake; reeds frame both sides equally. Nothing in the water (reveal firewall). Reader-magnet cover for Chronicles of the Still Lake.</desc>
